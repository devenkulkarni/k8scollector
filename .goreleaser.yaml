# .goreleaser.yaml
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0 # Ensures fully static binaries that run anywhere without dependencies
    goos:
      - linux
      - windows
      - darwin # This represents macOS
    goarch:
      - amd64 # Standard Intel/AMD 64-bit chips
      - arm64 # Apple Silicon (M1/M2/M3/M4) and modern ARM64 Linux servers
    binary: k8scollector # Sets the explicit name of the downloaded executable file

archives:
  - format: tar.gz
    # Use zip compression specifically for Windows targets so users can open them natively
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
