# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go Build and Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Manual Release Tag (e.g., v1.0.0) - Leave blank for normal build'
        required: false
        default: ''

  push:
    tags:
      - 'v*'

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'
        cache: true

    - name: Verify code formatting
      run: |
        if [ -n "$(gofmt -l .)" ]; then
          echo "The following files are poorly formatted:"
          gofmt -l .
          exit 1
        fi

    - name: Install dependencies
      run: go mod download
        
    - name: Build
      run: go build -v ./...

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    if: ${{ startsWith(github.ref, 'refs/tags/v') || github.event.inputs.tag_name != '' }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Required by GoReleaser to generate change logs

    - name: Create local tag if manual run
      if: ${{ github.event.inputs.tag_name != '' }}
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@://github.com"
        git tag -a "${{ github.event.inputs.tag_name }}" -m "Manual release via GitHub UI"

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'
        cache: true

    - name: Run GoReleaser
      uses: goreleaser/goreleaser-action@v6
      with:
        distribution: goreleaser
        version: latest
        args: release --clean
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 
